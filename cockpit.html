<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>運営コックピット</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app cockpit-app">
      <header class="topbar cockpit-topbar">
        <div>
          <p class="kicker">発信者のコックピット</p>
          <h1>運営コックピット</h1>
        </div>
        <div class="date-switcher">
          <button class="icon-button" id="prevDay" type="button" title="前日">‹</button>
          <input id="cockpitDate" type="date" />
          <button class="icon-button" id="nextDay" type="button" title="翌日">›</button>
        </div>
        <a class="nav-link" href="./index.html">ダッシュボードへ戻る</a>
      </header>

      <main class="cockpit-grid">
        <section class="panel cockpit-hero">
          <p class="kicker">今日迷わないための画面</p>
          <h2 id="cockpitDateLabel"></h2>
          <p>頑張るためではなく、続けるための仕組み。</p>
        </section>

        <section class="panel cockpit-priority">
          <p class="kicker">最優先を1つだけ</p>
          <label>今日一番大事なこと<textarea id="topPriority" rows="3"></textarea></label>
        </section>

        <section class="panel cockpit-article">
          <p class="kicker">毎朝、最初に確認</p>
          <label>今日の記事<textarea id="articleNote" rows="4" placeholder="タイトル、切り口、書き出しメモ"></textarea></label>
        </section>

        <section class="panel cockpit-growth">
          <p class="kicker">今日育てるもの（1つ）</p>
          <label><input id="growthTarget" type="text" placeholder="例：Substack交流" /></label>
        </section>

        <section class="panel">
          <h2>毎日タスク</h2>
          <div class="cockpit-checks" id="dailyChecks"></div>
        </section>

        <section class="panel cockpit-mail">
          <h2>メール確認</h2>
          <label>最後に確認した時間<input id="mailLastChecked" type="time" /></label>
          <div class="cockpit-checks" id="mailChecks"></div>
        </section>

        <section class="panel cockpit-creators">
          <div class="panel-heading">
            <div>
              <h2>毎日見る発信者</h2>
              <p class="kicker">毎朝優先して確認する人</p>
            </div>
            <form class="inline-form compact" id="creatorForm">
              <input id="creatorNameInput" type="text" placeholder="発信者を追加" aria-label="毎日見る発信者を追加" />
              <button type="submit">追加</button>
            </form>
          </div>
          <div class="creator-list" id="creatorList"></div>
        </section>

        <section class="panel cockpit-community">
          <h2>コメント・交流</h2>
          <div class="cockpit-checks" id="communityChecks"></div>
        </section>

        <section class="panel cockpit-today">
          <h2>今日の運営</h2>
          <label>今日やること<textarea id="todayFocus" rows="3"></textarea></label>
          <label>気づいたこと<textarea id="noticed" rows="4"></textarea></label>
        </section>

        <section class="panel cockpit-notes">
          <h2>考え方メモ</h2>
          <ul>
            <li>メールは毎日増える</li>
            <li>73人購読しているので全部は読まない</li>
            <li>情報は「読む」ではなく「拾う」</li>
          </ul>
        </section>
      </main>
    </div>

    <script src="./cockpit.js"></script>
  </body>
</html>
